<section class="blocky-wrap">
  <h2>Characters</h2>

  @if (busyLoad()) {
    <p class="small-note">Loading characters...</p>
  }

  <div class="gridy-cards">
    @for (wiz of listyChars(); track wiz.name) {
      <article class="one-card">
        <h3>{{ wiz.name }}</h3>
        <p><strong>House:</strong> {{ wiz.house || 'Unknown' }}</p>
        <p><strong>Actor:</strong> {{ wiz.actor || 'Unknown' }}</p>
      </article>
    }
  </div>
</section>
